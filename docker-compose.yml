services:
  localdeck:
    image: ghcr.io/manuamest/localdeck:latest
    build: .  # omit this line when using the published image directly
    network_mode: host
    environment:
      LOCALDECK_HOST: localhost
      LOCALDECK_PORT: 4888
      # "auto" descubre todos los puertos TCP en escucha del host
      # (requiere network_mode: host). Puedes añadir extras: "auto,3000".
      LOCALDECK_SCAN_PORTS: auto
      LOCALDECK_SCAN_INTERVAL: 10
      LOCALDECK_REQUEST_TIMEOUT: 2
