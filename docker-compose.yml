services:
  localdeck:
    build: .
    image: localdeck:dev
    ports:
      - "4888:4888"
    environment:
      LOCALDECK_HOST: host.docker.internal
      LOCALDECK_PORT: 4888
      LOCALDECK_SCAN_PORTS: 3000,3001,4173,4200,5000,5050,5173,5500,6274,7000,7860,8000-8010,8080-8084,8888,9000,9443,11434
      LOCALDECK_SCAN_INTERVAL: 10
      LOCALDECK_REQUEST_TIMEOUT: 2
    extra_hosts:
      - "host.docker.internal:host-gateway"
